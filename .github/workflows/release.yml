name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libopus-dev libdbus-1-dev pkg-config wget file

      - name: Build release
        run: cargo build --release --locked

      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp target/release/yumic-server AppDir/usr/bin/yumic-server
          cp assets/yumic.desktop AppDir/
          cp assets/yumic.svg AppDir/ 2>/dev/null || true
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage --desktop-file assets/yumic.desktop --icon-file assets/yumic.svg

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: yumic.flatpak
          manifest-path: .flatpak/builder/com.github.Excez0.yumic.json
          cache-key: flatpak-builder-${{ github.sha }}

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/yumic-server
            *.AppImage
            yumic.flatpak
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}