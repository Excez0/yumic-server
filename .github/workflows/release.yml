name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libopus-dev libdbus-1-dev pkg-config wget file flatpak flatpak-builder

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak SDK extensions
        run: |
          flatpak install --user -y flathub org.freedesktop.Sdk//24.08 org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Build release
        run: cargo build --release --locked

      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp target/release/yumic-server AppDir/usr/bin/yumic-server
          cp assets/yumic.desktop AppDir/
          cp assets/yumic.svg AppDir/ 2>/dev/null || true
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage --desktop-file assets/yumic.desktop --icon-file assets/yumic.svg

      - name: Create Flatpak
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Sdk//24.08 org.freedesktop.Sdk.Extension.rust-stable//24.08
          flatpak run --command=sh org.freedesktop.Sdk//24.08 -c "flatpak-builder --user --repo=repo --disable-rofiles-fuse --install-deps-from=flathub flatpak_app .flatpak/builder/com.github.Excez0.yumic.json"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/yumic-server
            *.AppImage
            *.flatpak
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}